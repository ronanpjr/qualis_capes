services:
  postgres:
    image: postgres:16-alpine
    container_name: qualis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qualis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qualis_pass}
      POSTGRES_DB: ${POSTGRES_DB:-qualis_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qualis_user} -d ${POSTGRES_DB:-qualis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
